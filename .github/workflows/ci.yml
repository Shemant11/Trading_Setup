name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Type check
        run: mypy src || true    # keep warn-only until strict-pass in Phase 1

      - name: Unit tests
        run: pytest tests/unit -v --cov=trader --cov-report=xml

      - name: Contract tests
        run: pytest tests/contract -v -m "not slow" || true
